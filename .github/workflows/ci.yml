name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npm test

      - name: Notificar exito en Discord
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"✅ CI Pipeline exitoso en el proyecto ci-demo-api. Tests ejecutados correctamente.\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notificar fallo en Discord
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"❌ CI Pipeline falló en el proyecto ci-demo-api. Revisar GitHub Actions para ver el error.\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}